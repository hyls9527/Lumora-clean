name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri
        id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Lumora ${{ github.ref_name }}
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true

      - name: Upload updater signature files
        if: matrix.os == 'windows-latest' || matrix.os == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          UPLOADED=""

          # Windows: find nsis.zip.sig
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            SIG=$(find src-tauri/target/release/bundle -name "*.nsis.zip.sig" 2>/dev/null | head -1)
            ZIP=$(find src-tauri/target/release/bundle -name "*.nsis.zip" 2>/dev/null | head -1)
            if [ -n "$SIG" ]; then
              echo "Uploading $(basename "$SIG")"
              gh release upload "$TAG" "$SIG" --clobber -R "$REPO" || true
              UPLOADED="yes"
            fi
            if [ -n "$ZIP" ]; then
              echo "Uploading $(basename "$ZIP")"
              gh release upload "$TAG" "$ZIP" --clobber -R "$REPO" || true
            fi
          fi

          # macOS: find app.tar.gz.sig
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            SIG=$(find src-tauri/target/release/bundle -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
            TAR=$(find src-tauri/target/release/bundle -name "*.app.tar.gz" 2>/dev/null | head -1)
            if [ -n "$SIG" ]; then
              echo "Uploading $(basename "$SIG")"
              gh release upload "$TAG" "$SIG" --clobber -R "$REPO" || true
              UPLOADED="yes"
            fi
            if [ -n "$TAR" ]; then
              echo "Uploading $(basename "$TAR")"
              gh release upload "$TAG" "$TAR" --clobber -R "$REPO" || true
            fi
          fi

          if [ -z "$UPLOADED" ]; then
            echo "WARNING: No sig files found, updater JSON will use local signing"
          fi

  updater-json:
    name: Generate updater JSON
    needs: build
    if: always() && needs.build.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install rsign2
        run: cargo install rsign2

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"
          TMPDIR=$(mktemp -d)
          PLATFORMS=""

          # Save signing key
          echo "$TAURI_SIGNING_PRIVATE_KEY" > "$TMPDIR/key"
          export RUST_BACKTRACE=1

          # --- Windows ---
          NSIS_SIG_NAME=$(gh release view "$TAG" -R "$REPO" --json assets --jq '.assets[] | select(.name | endswith(".nsis.zip.sig")) | .name' 2>/dev/null | head -1)

          if [ -n "$NSIS_SIG_NAME" ]; then
            # Sig file exists in release, download it
            gh release download "$TAG" -R "$REPO" -p "$NSIS_SIG_NAME" -D "$TMPDIR"
            WIN_SIG=$(cat "$TMPDIR/$NSIS_SIG_NAME" | tr -d '\r\n')
            echo "Windows: downloaded sig from release"
          else
            # Sign locally
            NSIS_EXE=$(gh release view "$TAG" -R "$REPO" --json assets --jq '.assets[] | select(.name | endswith("x64-setup.exe")) | .name' 2>/dev/null | head -1)
            if [ -n "$NSIS_EXE" ]; then
              gh release download "$TAG" -R "$REPO" -p "$NSIS_EXE" -D "$TMPDIR"
              rsign sign -s "$TMPDIR/key" -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$TMPDIR/$NSIS_EXE" 2>/dev/null || \
                rsign sign -x "$TMPDIR/$NSIS_EXE.sig" -s "$TMPDIR/key" "$TMPDIR/$NSIS_EXE" 2>/dev/null
              WIN_SIG=$(cat "$TMPDIR/$NSIS_EXE.sig" 2>/dev/null | tr -d '\r\n')
              echo "Windows: signed locally"
            fi
          fi

          NSIS_ZIP_NAME=$(gh release view "$TAG" -R "$REPO" --json assets --jq '.assets[] | select(.name | endswith(".nsis.zip")) | .name' 2>/dev/null | head -1)
          # Fallback to exe if no nsis.zip
          if [ -z "$NSIS_ZIP_NAME" ]; then
            NSIS_ZIP_NAME=$(gh release view "$TAG" -R "$REPO" --json assets --jq '.assets[] | select(.name | endswith("x64-setup.exe")) | .name' 2>/dev/null | head -1)
          fi

          if [ -n "$WIN_SIG" ] && [ -n "$NSIS_ZIP_NAME" ]; then
            WIN_URL="https://github.com/$REPO/releases/download/$TAG/$NSIS_ZIP_NAME"
            PLATFORMS="\"windows-x86_64\":{\"signature\":\"$WIN_SIG\",\"url\":\"$WIN_URL\"}"
            echo "Windows: OK"
          else
            echo "Windows: SKIPPED (sig=$WIN_SIG zip=$NSIS_ZIP_NAME)"
          fi

          # --- macOS ---
          MAC_SIG_NAME=$(gh release view "$TAG" -R "$REPO" --json assets --jq '.assets[] | select(.name | endswith(".app.tar.gz.sig")) | .name' 2>/dev/null | head -1)

          if [ -n "$MAC_SIG_NAME" ]; then
            gh release download "$TAG" -R "$REPO" -p "$MAC_SIG_NAME" -D "$TMPDIR"
            MAC_SIG=$(cat "$TMPDIR/$MAC_SIG_NAME" | tr -d '\r\n')
            echo "macOS: downloaded sig from release"
          else
            MAC_TAR=$(gh release view "$TAG" -R "$REPO" --json assets --jq '.assets[] | select(.name | endswith(".app.tar.gz")) | .name' 2>/dev/null | head -1)
            if [ -n "$MAC_TAR" ]; then
              gh release download "$TAG" -R "$REPO" -p "$MAC_TAR" -D "$TMPDIR"
              rsign sign -s "$TMPDIR/key" -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$TMPDIR/$MAC_TAR" 2>/dev/null || \
                rsign sign -x "$TMPDIR/$MAC_TAR.sig" -s "$TMPDIR/key" "$TMPDIR/$MAC_TAR" 2>/dev/null
              MAC_SIG=$(cat "$TMPDIR/$MAC_TAR.sig" 2>/dev/null | tr -d '\r\n')
              echo "macOS: signed locally"
            fi
          fi

          MAC_TAR_NAME=$(gh release view "$TAG" -R "$REPO" --json assets --jq '.assets[] | select(.name | endswith(".app.tar.gz")) | .name' 2>/dev/null | head -1)

          if [ -n "$MAC_SIG" ] && [ -n "$MAC_TAR_NAME" ]; then
            MAC_URL="https://github.com/$REPO/releases/download/$TAG/$MAC_TAR_NAME"
            if [ -n "$PLATFORMS" ]; then PLATFORMS="$PLATFORMS,"; fi
            PLATFORMS="$PLATFORMS\"darwin-aarch64\":{\"signature\":\"$MAC_SIG\",\"url\":\"$MAC_URL\"}"
            echo "macOS: OK"
          else
            echo "macOS: SKIPPED (sig=$MAC_SIG tar=$MAC_TAR_NAME)"
          fi

          # --- Generate latest.json ---
          if [ -n "$PLATFORMS" ]; then
            printf '{"version":"%s","notes":"","pub_date":"%s","platforms":{%s}}' \
              "$VERSION" "$PUB_DATE" "$PLATFORMS" > latest.json

            echo "=== latest.json ==="
            cat latest.json | python3 -m json.tool 2>/dev/null || cat latest.json

            gh release upload "$TAG" latest.json --clobber -R "$REPO"
            echo "Uploaded latest.json ✓"
          else
            echo "ERROR: No platforms found!"
            exit 1
          fi
