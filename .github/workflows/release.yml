name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri
        id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Lumora ${{ github.ref_name }}
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true

      - name: Upload NSIS updater artifacts
        if: matrix.os == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          BUNDLE_DIR="src-tauri/target/release/bundle/nsis"
          NSIS_ZIP=$(find "$BUNDLE_DIR" -name "*.nsis.zip" 2>/dev/null | head -1)
          NSIS_SIG=$(find "$BUNDLE_DIR" -name "*.nsis.zip.sig" 2>/dev/null | head -1)

          if [ -n "$NSIS_ZIP" ] && [ -n "$NSIS_SIG" ]; then
            echo "Uploading NSIS zip + sig..."
            gh release upload "$TAG" "$NSIS_ZIP" "$NSIS_SIG" --clobber -R ${{ github.repository }}
            echo "Done"
          else
            echo "WARNING: NSIS artifacts not found"
            exit 1
          fi

      - name: Upload macOS updater artifacts
        if: matrix.os == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          BUNDLE_DIR="src-tauri/target/release/bundle/macos"
          APP_TAR=$(find "$BUNDLE_DIR" -name "*.app.tar.gz" 2>/dev/null | head -1)
          APP_SIG=$(find "$BUNDLE_DIR" -name "*.app.tar.gz.sig" 2>/dev/null | head -1)

          if [ -n "$APP_TAR" ] && [ -n "$APP_SIG" ]; then
            echo "Uploading macOS updater tar + sig..."
            gh release upload "$TAG" "$APP_TAR" "$APP_SIG" --clobber -R ${{ github.repository }}
            echo "Done"
          else
            echo "WARNING: macOS updater artifacts not found"
            exit 1
          fi

  updater-json:
    name: Generate updater JSON
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"
          TMPDIR=$(mktemp -d)

          # Download Windows sig
          NSIS_SIG_URL="https://github.com/$REPO/releases/download/$TAG/"
          # Find the NSIS sig filename from release assets
          NSIS_SIG_NAME=$(gh release view "$TAG" -R "$REPO" --json assets --jq '.assets[] | select(.name | endswith(".nsis.zip.sig")) | .name' 2>/dev/null | head -1)
          NSIS_ZIP_NAME=$(gh release view "$TAG" -R "$REPO" --json assets --jq '.assets[] | select(.name | endswith(".nsis.zip")) | .name' 2>/dev/null | head -1)
          APP_SIG_NAME=$(gh release view "$TAG" -R "$REPO" --json assets --jq '.assets[] | select(.name | endswith(".app.tar.gz.sig")) | .name' 2>/dev/null | head -1)
          APP_TAR_NAME=$(gh release view "$TAG" -R "$REPO" --json assets --jq '.assets[] | select(.name | endswith(".app.tar.gz")) | .name' 2>/dev/null | head -1)

          PLATFORMS=""

          # Windows
          if [ -n "$NSIS_SIG_NAME" ] && [ -n "$NSIS_ZIP_NAME" ]; then
            gh release download "$TAG" -R "$REPO" -p "$NSIS_SIG_NAME" -D "$TMPDIR"
            WIN_SIG=$(cat "$TMPDIR/$NSIS_SIG_NAME" | tr -d '\r\n')
            WIN_URL="https://github.com/$REPO/releases/download/$TAG/$NSIS_ZIP_NAME"
            PLATFORMS="\"windows-x86_64\":{\"signature\":\"$WIN_SIG\",\"url\":\"$WIN_URL\"}"
            echo "Windows: OK"
          else
            echo "Windows: sig=$NSIS_SIG_NAME zip=$NSIS_ZIP_NAME — SKIPPED"
          fi

          # macOS
          if [ -n "$APP_SIG_NAME" ] && [ -n "$APP_TAR_NAME" ]; then
            gh release download "$TAG" -R "$REPO" -p "$APP_SIG_NAME" -D "$TMPDIR"
            MAC_SIG=$(cat "$TMPDIR/$APP_SIG_NAME" | tr -d '\r\n')
            MAC_URL="https://github.com/$REPO/releases/download/$TAG/$APP_TAR_NAME"
            if [ -n "$PLATFORMS" ]; then PLATFORMS="$PLATFORMS,"; fi
            PLATFORMS="$PLATFORMS\"darwin-aarch64\":{\"signature\":\"$MAC_SIG\",\"url\":\"$MAC_URL\"}"
            echo "macOS: OK"
          else
            echo "macOS: sig=$APP_SIG_NAME tar=$APP_TAR_NAME — SKIPPED"
          fi

          if [ -n "$PLATFORMS" ]; then
            printf '{"version":"%s","notes":"","pub_date":"%s","platforms":{%s}}' \
              "$VERSION" "$PUB_DATE" "$PLATFORMS" > latest.json

            echo "Generated latest.json:"
            cat latest.json | python3 -m json.tool 2>/dev/null || cat latest.json

            gh release upload "$TAG" latest.json --clobber -R "$REPO"
            echo "Uploaded latest.json"
          else
            echo "No updater platforms found!"
            exit 1
          fi
