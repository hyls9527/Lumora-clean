name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: actions/cache@v6
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Lumora ${{ github.ref_name }}
          releaseBody: |
            ## Lumora ${{ github.ref_name }}

            ### 下载
            - **Windows**: 下载 `lumora_*_x64-setup.exe` 安装
            - **macOS**: 下载 `.dmg` 文件安装
            - **Linux**: 下载 `.AppImage` 或 `.deb` 文件

            ### 自动更新
            已安装用户会在侧边栏收到更新提示。
          releaseDraft: true
          prerelease: false

  updater-json:
    name: Generate updater JSON
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node --input-type=module <<'NODESCRIPT'
          import { execSync } from "child_process";
          import { readFileSync, writeFileSync, mkdtempSync } from "fs";
          import { join } from "path";
          import { tmpdir } from "os";

          const tag = "${{ github.ref_name }}";
          const version = tag.replace(/^v/, "");
          const repo = "${{ github.repository }}";
          const dir = mkdtempSync(join(tmpdir(), "updater-"));

          function gh(args) {
            return execSync(`gh ${args}`, { encoding: "utf-8" }).trim();
          }

          const assetsJson = gh(`release view ${tag} -R ${repo} --json assets`);
          const assets = JSON.parse(assetsJson).assets;
          const platforms = {};

          // Windows: NSIS exe
          const nsisExe = assets.find(a => a.name.endsWith("setup.exe"));
          if (nsisExe) {
            platforms["windows-x86_64"] = {
              signature: "",
              url: `https://github.com/${repo}/releases/download/${tag}/${nsisExe.name}`
            };
          }

          // macOS: app.tar.gz
          const macTar = assets.find(a => a.name.endsWith("app.tar.gz"));
          if (macTar) {
            platforms["darwin-aarch64"] = {
              signature: "",
              url: `https://github.com/${repo}/releases/download/${tag}/${macTar.name}`
            };
          }

          // Linux: AppImage
          const appImage = assets.find(a => a.name.endsWith(".AppImage"));
          if (appImage) {
            platforms["linux-x86_64"] = {
              signature: "",
              url: `https://github.com/${repo}/releases/download/${tag}/${appImage.name}`
            };
          }

          const latestJson = {
            version,
            notes: "",
            pub_date: new Date().toISOString(),
            platforms
          };

          if (Object.keys(platforms).length === 0) {
            console.log("ERROR: No platforms found!");
            process.exit(1);
          }

          const outputPath = join(dir, "latest.json");
          writeFileSync(outputPath, JSON.stringify(latestJson, null, 2));
          console.log(JSON.stringify(latestJson, null, 2));

          gh(`release upload ${tag} ${outputPath} --clobber -R ${repo}`);
          console.log("Uploaded latest.json ✓");
          NODESCRIPT
