name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Lumora ${{ github.ref_name }}
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true

  updater-json:
    name: Generate updater JSON
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate latest.json with local signing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"
          DIR=$(mktemp -d)

          # Install minisign (lightweight, no Rust compile needed)
          curl -sL https://github.com/jedisct1/minisign/releases/download/0.12/minisign-0.12-linux.tar.gz | tar xz -C "$DIR"
          MINISIGN="$DIR/minisign-0.12-linux/x86_64/minisign"

          # Save signing key
          echo "$TAURI_SIGNING_PRIVATE_KEY" > "$DIR/key"
          chmod 600 "$DIR/key"

          PLATFORMS=""

          # --- Windows: sign NSIS exe ---
          NSIS_EXE=$(gh release view "$TAG" -R "$REPO" --json assets --jq '.assets[] | select(.name | test("setup\\.exe$")) | .name' | head -1)
          if [ -n "$NSIS_EXE" ]; then
            echo "Downloading $NSIS_EXE..."
            gh release download "$TAG" -R "$REPO" -p "$NSIS_EXE" -D "$DIR"
            echo "Signing..."
            echo "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" | "$MINISIGN" -S -s "$DIR/key" -m "$DIR/$NSIS_EXE" -x "$DIR/$NSIS_EXE.sig" 2>&1
            if [ -f "$DIR/$NSIS_EXE.sig" ]; then
              WIN_SIG=$(cat "$DIR/$NSIS_EXE.sig" | tr -d '\r\n')
              WIN_URL="https://github.com/$REPO/releases/download/$TAG/$NSIS_EXE"
              PLATFORMS="\"windows-x86_64\":{\"signature\":\"$WIN_SIG\",\"url\":\"$WIN_URL\"}"
              echo "Windows: signed ✓"
            else
              echo "Windows: signing failed"
            fi
          else
            echo "Windows: NSIS exe not found in release"
          fi

          # --- macOS: sign app.tar.gz ---
          MAC_TAR=$(gh release view "$TAG" -R "$REPO" --json assets --jq '.assets[] | select(.name | test("app\\.tar\\.gz$")) | .name' | head -1)
          if [ -n "$MAC_TAR" ]; then
            echo "Downloading $MAC_TAR..."
            gh release download "$TAG" -R "$REPO" -p "$MAC_TAR" -D "$DIR"
            echo "Signing..."
            echo "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" | "$MINISIGN" -S -s "$DIR/key" -m "$DIR/$MAC_TAR" -x "$DIR/$MAC_TAR.sig" 2>&1
            if [ -f "$DIR/$MAC_TAR.sig" ]; then
              MAC_SIG=$(cat "$DIR/$MAC_TAR.sig" | tr -d '\r\n')
              MAC_URL="https://github.com/$REPO/releases/download/$TAG/$MAC_TAR"
              if [ -n "$PLATFORMS" ]; then PLATFORMS="$PLATFORMS,"; fi
              PLATFORMS="$PLATFORMS\"darwin-aarch64\":{\"signature\":\"$MAC_SIG\",\"url\":\"$MAC_URL\"}"
              echo "macOS: signed ✓"
            else
              echo "macOS: signing failed"
            fi
          else
            echo "macOS: app.tar.gz not found in release"
          fi

          # --- Generate and upload latest.json ---
          if [ -n "$PLATFORMS" ]; then
            printf '{"version":"%s","notes":"","pub_date":"%s","platforms":{%s}}' \
              "$VERSION" "$PUB_DATE" "$PLATFORMS" > "$DIR/latest.json"

            echo "=== latest.json ==="
            cat "$DIR/latest.json"

            gh release upload "$TAG" "$DIR/latest.json" --clobber -R "$REPO"
            echo "Uploaded latest.json ✓"
          else
            echo "ERROR: No platforms signed!"
            exit 1
          fi
