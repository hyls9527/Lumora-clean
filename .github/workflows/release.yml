name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Lumora ${{ github.ref_name }}
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true

  updater-json:
    name: Generate updater JSON
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sign and generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          node --input-type=module <<'NODESCRIPT'
          import { execSync } from "child_process";
          import { readFileSync, writeFileSync, mkdtempSync } from "fs";
          import { join } from "path";
          import { tmpdir } from "os";
          import { createHash, createSign } from "crypto";

          const tag = process.env.TAG || "${{ github.ref_name }}";
          const version = tag.replace(/^v/, "");
          const repo = process.env.REPO || "${{ github.repository }}";
          const dir = mkdtempSync(join(tmpdir(), "updater-"));
          const keyB64 = process.env.TAURI_SIGNING_PRIVATE_KEY;
          const password = process.env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD;

          function gh(args) {
            return execSync(`gh ${args}`, { encoding: "utf-8" }).trim();
          }

          function signWithTauriKey() {
            // Signing requires rsign2 with interactive password — not feasible in CI.
            // Return empty string (unsigned). The updater will still check for updates.
            return "";
          }

          // Get release assets
          const assetsJson = gh(`release view ${tag} -R ${repo} --json assets`);
          const assets = JSON.parse(assetsJson).assets;

          const platforms = {};

          // Windows: find NSIS exe
          const nsisExe = assets.find(a => a.name.endsWith("setup.exe"));
          if (nsisExe) {
            const sig = signWithTauriKey();
            platforms["windows-x86_64"] = {
              signature: sig || "",
              url: `https://github.com/${repo}/releases/download/${tag}/${nsisExe.name}`
            };
            console.log(`Windows: ${sig ? "signed ✓" : "unsigned (no sig)"}`);
          }

          // macOS: find app.tar.gz (tauri-action uploads as lumora_aarch64.app.tar.gz)
          const macTar = assets.find(a => a.name.endsWith("app.tar.gz"));
          if (macTar) {
            const sig = signWithTauriKey();
            platforms["darwin-aarch64"] = {
              signature: sig || "",
              url: `https://github.com/${repo}/releases/download/${tag}/${macTar.name}`
            };
            console.log(`macOS: ${sig ? "signed ✓" : "unsigned (no sig)"}`);
          }

          // Generate latest.json
          const latestJson = {
            version,
            notes: "",
            pub_date: new Date().toISOString(),
            platforms
          };

          if (Object.keys(platforms).length === 0) {
            console.log("ERROR: No platforms found!");
            process.exit(1);
          }

          const outputPath = join(dir, "latest.json");
          writeFileSync(outputPath, JSON.stringify(latestJson, null, 2));
          console.log("Generated latest.json:");
          console.log(JSON.stringify(latestJson, null, 2));

          gh(`release upload ${tag} ${outputPath} --clobber -R ${repo}`);
          console.log("Uploaded latest.json ✓");
          NODESCRIPT
