<body>
    <div style="display:flex; min-height:100vh;">

      <!-- Sidebar -->
      <aside style="width:200px; flex-shrink:0; display:flex; flex-direction:column; background:var(--color-background); border-right:1px solid var(--color-border);" role="navigation" aria-label="主导航">
        <!-- Logo -->
        <div style="padding:32px 24px 24px;">
          <h1 style="font-size:28px; font-weight:700; font-family:var(--font-display); color:var(--color-primary); line-height:1;">L</h1>
        </div>
        <!-- Navigation -->
        <nav style="flex:1; display:flex; flex-direction:column; gap:4px; padding:0 12px;" aria-label="Main navigation">
          <a href="#" data-dom-id="nav-creator-gallery" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">
            创作者图库
          </a>
          <a href="#" data-dom-id="nav-normal-gallery" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">
            普通图库
          </a>
          <a href="#" data-dom-id="nav-curation" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">
            策展
          </a>
          <a href="#" data-dom-id="nav-dashboard" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">
            仪表盘
          </a>
          <a href="#" data-dom-id="nav-import" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">
            导入管理
          </a>
          <a href="#" data-dom-id="nav-search" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">
            语义搜索

          <a href="#" data-dom-id="nav-favorites" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">

          <a href="#" data-dom-id="nav-settings" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">

            回收站

        <!-- Theme Toggle -->
        <div style="padding:0 12px 8px;">
          <button onclick="document.documentElement.classList.toggle('dark'); document.documentElement.classList.toggle('light'); this.textContent = document.documentElement.classList.contains('dark') ? '切换亮色' : '切换暗色';" style="display:flex; align-items:center; justify-content:center; width:100%; padding:8px 12px; font-size:10px; font-family:var(--font-display); color:var(--color-muted-foreground); background:none; border:1px solid var(--color-border); border-radius:var(--radius-md); cursor:pointer; transition:color 200ms, border-color 200ms;">
            切换暗色
          </button>
        </div>
        <!-- Bottom: Search -->
        <div style="padding:0 12px 24px;">
          <button style="display:flex; align-items:center; justify-content:center; width:100%; padding:10px 12px; font-size:11px; font-family:var(--font-display); color:var(--color-muted-foreground); background:none; border:1px solid var(--color-border); border-radius:var(--radius-md); cursor:pointer; transition:color 200ms, border-color 200ms;" aria-label="搜索">
            搜索 ⌘K
          </button>
        </div>
      </aside>

      <!-- Main content -->
      <main style="flex:1; overflow-y:auto; display:flex; flex-direction:column;">
        <div style="width:100%; max-width:960px; margin:0 auto; padding:32px;">

          <!-- Page Header -->
          <header style="margin-bottom:24px;">
            <div style="display:flex; align-items:flex-start; justify-content:space-between;">
              <div>
                <h2 style="font-size:20px; font-weight:600; font-family:var(--font-display); color:var(--color-foreground);">回收站</h2>
                <p style="margin-top:4px; font-size:12px; font-family:var(--font-body); color:var(--color-muted-foreground);">12 件已删除 · 30 天后自动清理</p>
              </div>
              <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
                <button
                  style="padding:6px 14px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border:1px solid var(--color-border); border-radius:var(--radius-md); background:transparent; cursor:pointer; transition:all 200ms;"
                  onmouseover="this.style.borderColor='var(--legend-neutral-300)'; this.style.color='var(--color-foreground)'"
                  onmouseout="this.style.borderColor='var(--color-border)'; this.style.color='var(--color-muted-foreground)'"
                  aria-label="清空回收站"
                >
                  清空回收站
                </button>
                <button
                  onclick="toggleBatchMode()"
                  style="padding:6px 14px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border:1px solid var(--color-border); border-radius:var(--radius-md); background:transparent; cursor:pointer; transition:all 200ms;"
                  onmouseover="this.style.borderColor='var(--legend-neutral-300)'; this.style.color='var(--color-foreground)'"
                  onmouseout="this.style.borderColor='var(--color-border)'; this.style.color='var(--color-muted-foreground)'"
                  aria-label="批量操作"
                >
                  批量操作
                </button>
              </div>
            </div>
          </header>

          <!-- Info Banner -->
          <div class="info-banner" style="margin-bottom:24px;">
            已删除的作品将在 30 天后自动永久删除。你可以随时恢复它们。
          </div>

          <!-- Batch Operation Bar (hidden by default) -->
          <div id="batch-bar" class="batch-bar" style="margin-bottom:16px;">
            <label>
              <input type="checkbox" id="select-all" onchange="toggleSelectAll(this.checked)">
              全选
            </label>
            <span class="count" id="batch-count">已选 0 张</span>
            <div style="flex:1;"></div>
            <button class="btn-batch btn-batch-restore" aria-label="批量恢复">批量恢复</button>
            <button class="btn-batch btn-batch-delete" aria-label="批量永久删除">批量永久删除</button>
            <button class="btn-cancel" onclick="toggleBatchMode()">取消</button>
          </div>

          <!-- Deleted Items List -->
          <section id="trash-list" style="display:flex; flex-direction:column; gap:8px;" aria-label="已删除作品列表">

            <!-- Item 1: 幻想浮岛 v1 -->
            <div class="trash-row" data-id="1">
              <input type="checkbox" class="row-checkbox" aria-label="选择 幻想浮岛 v1">
              <img class="thumb" src="../assets/ai-fantasy-01.jpg" alt="幻想浮岛 v1 缩略图">
              <div class="meta">
                <div class="meta-title">幻想浮岛 v1</div>
                <div class="meta-detail">
                  SDXL 1.0 · 删除于 3天前
                  <span class="days">剩余 27天</span>
                </div>
              </div>
              <div class="actions">
                <button class="btn-restore" onclick="restoreItem(this)" aria-label="恢复 幻想浮岛 v1">恢复</button>
                <button class="btn-delete-perm" onclick="deletePermanently(this)" aria-label="永久删除 幻想浮岛 v1">永久删除</button>
              </div>
            </div>

            <!-- Item 2: 赛博艺伎 (draft) -->
            <div class="trash-row" data-id="2">
              <input type="checkbox" class="row-checkbox" aria-label="选择 赛博艺伎 (draft)">
              <img class="thumb" src="../assets/ai-character-01.jpg" alt="赛博艺伎 (draft) 缩略图">
              <div class="meta">
                <div class="meta-title">赛博艺伎 (draft)</div>
                <div class="meta-detail">
                  Flux.1 · 删除于 7天前
                  <span class="days">剩余 23天</span>
                </div>
              </div>
              <div class="actions">
                <button class="btn-restore" onclick="restoreItem(this)" aria-label="恢复 赛博艺伎 (draft)">恢复</button>
                <button class="btn-delete-perm" onclick="deletePermanently(this)" aria-label="永久删除 赛博艺伎 (draft)">永久删除</button>
              </div>
            </div>

            <!-- Item 3: 废弃构图 -->
            <div class="trash-row" data-id="3">
              <input type="checkbox" class="row-checkbox" aria-label="选择 废弃构图">
              <img class="thumb" src="../assets/ai-landscape-01.jpg" alt="废弃构图 缩略图">
              <div class="meta">
                <div class="meta-title">废弃构图</div>
                <div class="meta-detail">
                  Midjourney v6 · 删除于 15天前
                  <span class="days">剩余 15天</span>
                </div>
              </div>
              <div class="actions">
                <button class="btn-restore" onclick="restoreItem(this)" aria-label="恢复 废弃构图">恢复</button>
                <button class="btn-delete-perm" onclick="deletePermanently(this)" aria-label="永久删除 废弃构图">永久删除</button>
              </div>
            </div>

            <!-- Item 4: 测试输出 #47 (urgent) -->
            <div class="trash-row" data-id="4">
              <input type="checkbox" class="row-checkbox" aria-label="选择 测试输出 #47">
              <img class="thumb" src="../assets/ai-abstract-01.jpg" alt="测试输出 #47 缩略图">
              <div class="meta">
                <div class="meta-title">测试输出 #47</div>
                <div class="meta-detail">
                  ComfyUI · 删除于 28天前
                  <span class="days urgent">剩余 2天</span>
                </div>
              </div>
              <div class="actions">
                <button class="btn-restore" onclick="restoreItem(this)" aria-label="恢复 测试输出 #47">恢复</button>
                <button class="btn-delete-perm" onclick="deletePermanently(this)" aria-label="永久删除 测试输出 #47">永久删除</button>
              </div>
            </div>

          </section>

          <!-- Empty State (hidden by default) -->
          <section id="empty-trash" style="display:none; flex-direction:column; align-items:center; justify-content:center; padding:80px 0;" aria-label="回收站为空">
            <div style="font-family:var(--font-display); font-size:48px; color:var(--legend-neutral-300); line-height:1;">&#9670;</div>
            <h3 style="margin-top:24px; font-size:16px; font-weight:400; font-family:var(--font-display); color:var(--color-muted-foreground);">回收站为空</h3>
            <p style="margin-top:8px; text-align:center; max-width:280px; font-size:13px; line-height:1.6; font-family:var(--font-body); color:var(--legend-neutral-300);">没有已删除的作品</p>
            <button
              disabled
              style="margin-top:20px; padding:8px 20px; font-size:12px; font-family:var(--font-display); color:var(--legend-neutral-400); background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-md); cursor:not-allowed; opacity:0.6;"
              aria-label="清空回收站"
            >
              清空回收站
            </button>
          </section>

        </div>
      </main>

    </div>
    <script>
      let batchMode = false;

      function toggleBatchMode() {
        batchMode = !batchMode;
        const bar = document.getElementById('batch-bar');
        const checkboxes = document.querySelectorAll('.row-checkbox');
        if (batchMode) {
          bar.style.display = 'flex';
          checkboxes.forEach(function(cb) { cb.classList.add('visible'); });
        } else {
          bar.style.display = 'none';
          checkboxes.forEach(function(cb) { cb.classList.remove('visible'); cb.checked = false; });
          document.getElementById('select-all').checked = false;
          updateBatchCount();
        }
      }

      function toggleSelectAll(checked) {
        var checkboxes = document.querySelectorAll('.row-checkbox');
        checkboxes.forEach(function(cb) { cb.checked = checked; });
        updateBatchCount();
      }

      function updateBatchCount() {
        var checked = document.querySelectorAll('.row-checkbox:checked').length;
        document.getElementById('batch-count').textContent = '已选 ' + checked + ' 张';
      }

      document.querySelectorAll('.row-checkbox').forEach(function(cb) {
        cb.addEventListener('change', updateBatchCount);
      });

      function restoreItem(btn) {
        var row = btn.closest('.trash-row');
        row.style.opacity = '0';
        row.style.transform = 'translateX(20px)';
        row.style.transition = 'opacity 200ms, transform 200ms';
        setTimeout(function() {
          row.remove();
          checkEmpty();
        }, 200);
      }

      function deletePermanently(btn) {
        var row = btn.closest('.trash-row');
        row.style.opacity = '0';
        row.style.transform = 'translateX(-20px)';
        row.style.transition = 'opacity 200ms, transform 200ms';
        setTimeout(function() {
          row.remove();
          checkEmpty();
        }, 200);
      }

      function checkEmpty() {
        var list = document.getElementById('trash-list');
        var empty = document.getElementById('empty-trash');
        if (list.children.length === 0) {
          list.style.display = 'none';
          empty.style.display = 'flex';
        }
      }
    </script>
