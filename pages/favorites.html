<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumora - 收藏</title>
    <style id="theme-vars">
:root {
  --color-background: #faf8f5; --color-surface: #f0ece5; --color-card: #faf8f5;
  --color-foreground: #4e4238; --color-on-surface: #4e4238; --color-muted-foreground: #877461;
  --color-primary: #c9922e; --color-primary-hover: #a87425; --color-on-primary: #1a1614;
  --color-primary-container: #fdf8ef; --color-on-primary-container: #5a3815;
  --color-accent: #b57540; --color-accent-foreground: #faf8f5;
  --color-success: #4d6f44; --color-warning: #cc5c15; --color-error: #954242;
  --color-border: #e2dbd0; --color-outline: #e2dbd0;
  --radius-sm: 2px; --radius-md: 4px; --radius-lg: 8px; --radius-xl: 12px;
  --font-display: 'Noto Serif SC', serif; --font-body: 'Noto Sans SC', sans-serif; --font-mono: 'Noto Sans SC', monospace;
  --legend-neutral-50: #faf8f5; --legend-neutral-100: #f0ece5; --legend-neutral-200: #e2dbd0; --legend-neutral-300: #cfc4b4; --legend-neutral-400: #b5a693; --legend-neutral-500: #9e8d78; --legend-neutral-600: #877461; --legend-neutral-700: #6f5d4e; --legend-neutral-800: #5c4d42; --legend-neutral-900: #4e4238;
  --legend-primary-50: #fdf8ef; --legend-primary-100: #f9edcf; --legend-primary-200: #f0d89e; --legend-primary-300: #e5bf64; --legend-primary-400: #d9a63e; --legend-primary-500: #c9922e; --legend-primary-600: #a87425; --legend-primary-700: #87571e; --legend-primary-800: #6d4419; --legend-primary-900: #5a3815;
  --legend-accent-50: #faf5f0; --legend-accent-100: #f0e4d6; --legend-accent-200: #e0c9b0; --legend-accent-300: #cca882; --legend-accent-400: #c08c5a; --legend-accent-500: #b57540; --legend-accent-600: #9a5f33; --legend-accent-700: #7d4c2a; --legend-accent-800: #663e25; --legend-accent-900: #543520;
  --legend-success-50: #f4f7f2; --legend-success-100: #e5edde; --legend-success-200: #c9d9be; --legend-success-300: #a5be97; --legend-success-400: #82a372; --legend-success-500: #648c58; --legend-success-600: #4d6f44; --legend-success-700: #3b5635; --legend-success-800: #2d432a; --legend-success-900: #243722;
  --legend-warning-50: #fef7ef; --legend-warning-100: #fde8cf; --legend-warning-200: #facda0; --legend-warning-300: #f6ac6a; --legend-warning-400: #f18e3e; --legend-warning-500: #e87520; --legend-warning-600: #cc5c15; --legend-warning-700: #a84612; --legend-warning-800: #8a3814; --legend-warning-900: #723014;
  --legend-error-50: #f9f2f2; --legend-error-100: #f0e0e0; --legend-error-200: #e0c0bf; --legend-error-300: #cc9a98; --legend-error-400: #bc7573; --legend-error-500: #ab5553; --legend-error-600: #954242; --legend-error-700: #7c3535; --legend-error-800: #662d2d; --legend-error-900: #552828;
}
.card-shadow { box-shadow: 0 1px 2px rgba(78,50,23,0.06), 0 1px 1px rgba(78,50,23,0.04); }
html.dark { --color-background: #1a1614; --color-surface: #231f1b; --color-card: #2a2520; --color-foreground: #e2dbd0; --color-on-surface: #e2dbd0; --color-muted-foreground: #9e8d78; --color-primary: #d9a63e; --color-primary-hover: #e5bf64; --color-on-primary: #1a1614; --color-primary-container: #2a2520; --color-on-primary-container: #e5bf64; --color-accent: #c08c5a; --color-accent-foreground: #1a1614; --color-success: #82a372; --color-warning: #f18e3e; --color-error: #cc9a98; --color-border: #3d362e; --color-outline: #3d362e; --legend-neutral-50: #1a1614; --legend-neutral-100: #231f1b; --legend-neutral-200: #2a2520; --legend-neutral-300: #3d362e; --legend-neutral-400: #5c4d42; --legend-neutral-500: #877461; --legend-neutral-600: #9e8d78; --legend-neutral-700: #b5a693; --legend-neutral-800: #cfc4b4; --legend-neutral-900: #e2dbd0; --legend-primary-50: #2a2520; --legend-primary-100: #3d362e; --legend-primary-200: #5a3815; --legend-primary-300: #6d4419; --legend-primary-400: #87571e; --legend-primary-500: #a87425; --legend-primary-600: #c9922e; --legend-primary-700: #d9a63e; --legend-primary-800: #e5bf64; --legend-primary-900: #f0d89e; --legend-accent-50: #2a2520; --legend-accent-100: #3d362e; --legend-accent-200: #543520; --legend-accent-300: #663e25; --legend-accent-400: #7d4c2a; --legend-accent-500: #9a5f33; --legend-accent-600: #b57540; --legend-accent-700: #c08c5a; --legend-accent-800: #cca882; --legend-accent-900: #e0c9b0; --legend-success-50: #2a2520; --legend-success-100: #3b5635; --legend-success-200: #4d6f44; --legend-success-300: #648c58; --legend-success-400: #82a372; --legend-success-500: #a5be97; --legend-success-600: #c9d9be; --legend-success-700: #e5edde; --legend-success-800: #f4f7f2; --legend-success-900: #faf8f5; --legend-warning-50: #2a2520; --legend-warning-100: #723014; --legend-warning-200: #8a3814; --legend-warning-300: #a84612; --legend-warning-400: #cc5c15; --legend-warning-500: #e87520; --legend-warning-600: #f18e3e; --legend-warning-700: #f6ac6a; --legend-warning-800: #facda0; --legend-warning-900: #fde8cf; --legend-error-50: #2a2520; --legend-error-100: #552828; --legend-error-200: #662d2d; --legend-error-300: #7c3535; --legend-error-400: #954242; --legend-error-500: #ab5553; --legend-error-600: #bc7573; --legend-error-700: #cc9a98; --legend-error-800: #e0c0bf; --legend-error-900: #f0e0e0; }
html.dark .card-shadow { box-shadow: 0 1px 2px rgba(42,37,32,0.25), 0 1px 1px rgba(42,37,32,0.18); }
.masonry-grid { column-count: 3; column-gap: 12px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @layer base {
    body { background: var(--color-background); color: var(--color-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] { display: inline-flex; align-items: center; justify-content: center; -webkit-mask-size: contain; mask-size: contain; -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat; -webkit-mask-position: center; mask-position: center; background-color: currentColor; }
    </style>
</head>
<body>
    <div style="display:flex; min-height:100vh;">

      <!-- Sidebar -->
      <aside style="width:200px; flex-shrink:0; display:flex; flex-direction:column; background:var(--color-background); border-right:1px solid var(--color-border);" role="navigation" aria-label="主导航">
        <!-- Logo -->
        <div style="padding:32px 24px 24px;">
          <h1 style="font-size:28px; font-weight:700; font-family:var(--font-display); color:var(--color-primary); line-height:1;">L</h1>
        </div>
        <!-- Navigation -->
        <nav style="flex:1; display:flex; flex-direction:column; gap:4px; padding:0 12px;" aria-label="Main navigation">
          <a href="#" data-dom-id="nav-creator-gallery" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">
            创作者图库
          </a>
          <a href="#" data-dom-id="nav-normal-gallery" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">
            普通图库
          </a>
          <a href="#" data-dom-id="nav-curation" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">
            策展
          </a>
          <a href="#" data-dom-id="nav-dashboard" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">
            仪表盘
          </a>
          <a href="#" data-dom-id="nav-import" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">
            导入管理
          </a>
          <a href="#" data-dom-id="nav-search" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">
            语义搜索
          </a>
          <a href="#" data-dom-id="nav-favorites" aria-current="page" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:700; font-family:var(--font-display); color:var(--color-primary); border-left:3px solid var(--color-primary); letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">
            收藏
          </a>
          <a href="#" data-dom-id="nav-prompts" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">
            提示词库
          </a>
          <a href="#" data-dom-id="nav-settings" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">
            设置
          </a>
          <a href="#" data-dom-id="nav-trash" style="display:flex; align-items:center; padding:10px 12px; font-size:11px; font-weight:500; font-family:var(--font-display); color:var(--color-muted-foreground); border-left:3px solid transparent; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; transition:color 200ms, border-color 200ms;">
            回收站
          </a>
        </nav>
        <!-- Theme Toggle -->
        <div style="padding:0 12px 8px;">
          <button onclick="document.documentElement.classList.toggle('dark'); document.documentElement.classList.toggle('light'); this.textContent = document.documentElement.classList.contains('dark') ? '切换亮色' : '切换暗色';" style="display:flex; align-items:center; justify-content:center; width:100%; padding:8px 12px; font-size:10px; font-family:var(--font-display); color:var(--color-muted-foreground); background:none; border:1px solid var(--color-border); border-radius:var(--radius-md); cursor:pointer; transition:color 200ms, border-color 200ms;">
            切换暗色
          </button>
        </div>
        <!-- Bottom: Search -->
        <div style="padding:0 12px 24px;">
          <button style="display:flex; align-items:center; justify-content:center; width:100%; padding:10px 12px; font-size:11px; font-family:var(--font-display); color:var(--color-muted-foreground); background:none; border:1px solid var(--color-border); border-radius:var(--radius-md); cursor:pointer; transition:color 200ms, border-color 200ms;" aria-label="搜索">
            搜索 ⌘K
          </button>
        </div>
      </aside>

      <!-- Main content -->
      <main style="flex:1; overflow-y:auto; display:flex; flex-direction:column;">

        <!-- Page Header -->
        <div style="padding:40px 40px 0;">
          <h2 style="font-size:20px; font-weight:600; font-family:var(--font-display); color:var(--color-foreground); margin:0 0 4px;">收藏</h2>
          <p style="font-size:13px; color:var(--color-muted-foreground); font-family:var(--font-body); margin:0;">已收藏 24 件作品</p>
        </div>

        <!-- Filter Bar -->
        <div style="padding:24px 40px 0; display:flex; align-items:center; gap:16px;">
          <!-- Sort Dropdown -->
          <div style="position:relative; display:inline-block;">
            <select style="font-size:11px; font-family:var(--font-display); color:var(--color-foreground); background:var(--color-card); border:1px solid var(--color-border); border-radius:var(--radius-md); padding:6px 28px 6px 10px; appearance:none; cursor:pointer; transition:border-color 200ms; outline:none;" aria-label="排序方式">
              <option>收藏时间</option>
              <option>评分</option>
              <option>模型</option>
            </select>
            <span style="position:absolute; right:10px; top:50%; transform:translateY(-50%); font-size:8px; color:var(--color-muted-foreground); pointer-events:none;">▾</span>
          </div>
          <!-- Divider -->
          <div style="width:1px; height:20px; background:var(--color-border);"></div>
          <!-- Filter Pills -->
          <div style="display:flex; align-items:center; gap:6px;">
            <button style="font-size:11px; font-family:var(--font-display); color:var(--legend-neutral-50); background:var(--legend-primary-500); border:none; padding:4px 14px; border-radius:var(--radius-md); transition:background 200ms, color 200ms; cursor:pointer;" aria-label="显示全部" aria-pressed="true">
              全部
            </button>
            <button style="font-size:11px; font-family:var(--font-display); color:var(--color-muted-foreground); background:transparent; border:1px solid var(--color-border); padding:4px 14px; border-radius:var(--radius-md); transition:color 200ms, border-color 200ms; cursor:pointer;" aria-label="筛选创作者作品" aria-pressed="false">
              创作者
            </button>
            <button style="font-size:11px; font-family:var(--font-display); color:var(--color-muted-foreground); background:transparent; border:1px solid var(--color-border); padding:4px 14px; border-radius:var(--radius-md); transition:color 200ms, border-color 200ms; cursor:pointer;" aria-label="筛选普通照片" aria-pressed="false">
              普通
            </button>
          </div>
          <!-- Divider -->
          <div style="width:1px; height:20px; background:var(--color-border);"></div>
          <!-- View Mode Toggle -->
          <div style="display:flex; align-items:center; gap:2px;">
            <button style="font-size:11px; font-family:var(--font-display); color:var(--color-primary); background:none; border:none; padding-bottom:2px; border-bottom:2px solid var(--color-primary); transition:color 200ms;">网格</button>
            <button style="font-size:11px; font-family:var(--font-display); color:var(--color-muted-foreground); background:none; border:none; padding-bottom:2px; border-bottom:2px solid transparent; transition:color 200ms;">列表</button>
          </div>
          <div style="flex:1;"></div>
          <button onclick="document.getElementById('batch-bar').style.display = document.getElementById('batch-bar').style.display === 'none' || !document.getElementById('batch-bar').style.display ? 'flex' : 'none'" style="font-size:11px; font-family:var(--font-display); color:var(--color-muted-foreground); background:none; border:1px solid var(--color-border); padding:4px 12px; border-radius:var(--radius-md); transition:color 200ms;" aria-label="批量操作">
            批量操作
          </button>
        </div>

        <!-- Batch Operation Bar (hidden by default) -->
        <div id="batch-bar" style="display:none; padding:10px 40px; background:var(--color-surface); border-bottom:1px solid var(--color-border); align-items:center; gap:12px;">
          <label style="display:flex; align-items:center; gap:6px; font-size:11px; font-family:var(--font-display); color:var(--color-foreground); cursor:pointer;">
            <input type="checkbox" style="accent-color:var(--color-primary); width:14px; height:14px;">
            全选
          </label>
          <span style="font-size:11px; color:var(--color-muted-foreground);">已选 0 张</span>
          <div style="flex:1;"></div>
          <div style="position:relative;">
            <button onclick="document.getElementById('export-menu').style.display = document.getElementById('export-menu').style.display === 'none' || !document.getElementById('export-menu').style.display ? 'block' : 'none'" style="font-size:11px; font-family:var(--font-display); color:var(--color-primary); background:none; border:1px solid var(--color-border); padding:4px 12px; border-radius:var(--radius-md); transition:color 200ms; cursor:pointer;">导出</button>
            <div id="export-menu" style="display:none; position:absolute; top:100%; left:0; margin-top:4px; background:var(--color-card); border:1px solid var(--color-border); border-radius:var(--radius-md); box-shadow:0 4px 12px rgba(78,50,23,0.1); z-index:50; min-width:140px; overflow:hidden;">
              <button style="display:block; width:100%; text-align:left; padding:8px 14px; font-size:11px; font-family:var(--font-display); color:var(--color-foreground); background:none; border:none; cursor:pointer; transition:background 200ms;" onmouseover="this.style.background='var(--color-surface)'" onmouseout="this.style.background='none'">导出为 ZIP</button>
              <button style="display:block; width:100%; text-align:left; padding:8px 14px; font-size:11px; font-family:var(--font-display); color:var(--color-foreground); background:none; border:none; cursor:pointer; transition:background 200ms;" onmouseover="this.style.background='var(--color-surface)'" onmouseout="this.style.background='none'">导出元数据 (JSON)</button>
              <button style="display:block; width:100%; text-align:left; padding:8px 14px; font-size:11px; font-family:var(--font-display); color:var(--color-foreground); background:none; border:none; cursor:pointer; transition:background 200ms;" onmouseover="this.style.background='var(--color-surface)'" onmouseout="this.style.background='none'">导出元数据 (CSV)</button>
            </div>
          </div>
          <button style="font-size:11px; font-family:var(--font-display); color:var(--color-error); background:none; border:1px solid var(--color-border); padding:4px 12px; border-radius:var(--radius-md); transition:color 200ms;">批量删除</button>
          <button style="font-size:11px; font-family:var(--font-display); color:var(--color-primary); background:none; border:1px solid var(--color-border); padding:4px 12px; border-radius:var(--radius-md); transition:color 200ms;">批量收藏</button>
          <button style="font-size:11px; font-family:var(--font-display); color:var(--color-muted-foreground); background:none; border:1px solid var(--color-border); padding:4px 12px; border-radius:var(--radius-md); transition:color 200ms;">批量移动</button>
          <button style="font-size:11px; font-family:var(--font-display); color:var(--color-muted-foreground); background:none; border:none; padding:4px 12px; transition:color 200ms; text-decoration:underline; text-underline-offset:2px;">取消</button>
        </div>

        <!-- Empty State: No Favorites -->
        <div id="empty-favorites" style="display:none; text-align:center; padding:80px 40px;">
          <div style="font-family:var(--font-display); font-size:48px; color:var(--legend-neutral-300); margin-bottom:16px; line-height:1;">&#9670;</div>
          <div style="font-family:var(--font-display); font-size:18px; color:var(--color-foreground); margin-bottom:8px;">还没有收藏的作品</div>
          <div style="font-size:13px; color:var(--color-muted-foreground); max-width:400px; margin:0 auto; line-height:1.8;">
            在图库中点击 ◆ 即可收藏喜欢的作品。<br>
            收藏的作品会集中在这里，方便快速回顾。
          </div>
        </div>

        <!-- Masonry Grid -->
        <div class="masonry-grid" style="padding:28px 40px 40px;">

          <!-- Card 1: ai-fantasy-01.jpg -->
          <div class="break-inside-avoid mb-3 card-shadow" style="border-radius: var(--radius-sm); overflow:hidden;">
            <img src="../assets/ai-fantasy-01.jpg" alt="Ethereal floating island with ancient temple ruins surrounded by bioluminescent mist and volumetric lighting, AI fantasy concept art" style="display:block; width:100%;">
            <div style="padding:10px 12px; background:var(--legend-neutral-50);">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                <span style="font-size:12px; font-weight:500; color:var(--color-foreground); font-family:var(--font-display);">浮空古殿</span>
                <span style="font-size:13px; color:var(--color-primary);">◆</span>
              </div>
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:10px; color:var(--color-muted-foreground); font-family:var(--font-body);">SDXL 1.0</span>
                <span style="font-size:10px; color:var(--legend-primary-400);">✿✿✿✿✿</span>
              </div>
            </div>
          </div>

          <!-- Card 2: ai-character-01.jpg -->
          <div class="break-inside-avoid mb-3 card-shadow" style="border-radius: var(--radius-sm); overflow:hidden; cursor:pointer;" onclick="openLightbox('赛博艺伎', 'Flux.1 · ✿✿✿✿', '../assets/ai-character-01.jpg')">
            <img src="../assets/ai-character-01.jpg" alt="Cyberpunk geisha wearing neon kimono in a rain-soaked Tokyo alley with holographic cherry blossoms, AI character art" style="display:block; width:100%;">
            <div style="padding:10px 12px; background:var(--legend-neutral-50);">

    <script>
function openLightbox(title, meta, imgSrc) {
  if (document.getElementById('batch-bar').style.display === 'flex') return;
  document.getElementById('lightbox-img').src = imgSrc;
  document.getElementById('lightbox-title').textContent = title;
  document.getElementById('lightbox-meta').textContent = meta;
  document.getElementById('lightbox').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
</script>
